<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Radio</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=JetBrains+Mono:wght@400&display=swap');

:root {
  --bg: #05080c;
  --panel: #0a0f16;
  --panel2: #0d1420;
  --border: #0e2030;
  --acc: #ff2d2d;
  --acc2: #ff6b35;
  --bt: #00e5ff;
  --glow: #00e5ff;
  --sp: #1db954;
  --txt: #a0c8d8;
  --muted: #00b4cc;
  --display: 'Bebas Neue', sans-serif;
  --mono: 'JetBrains Mono', monospace;
  --body: 'DM Sans', sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
  background: var(--bg);
  color: var(--txt);
  font-family: var(--body);
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(0,229,255,.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,229,255,.04) 1px, transparent 1px);
  background-size: 48px 48px;
  pointer-events: none;
  z-index: 0;
}

body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,.08) 2px,
    rgba(0,0,0,.08) 4px
  );
  pointer-events: none;
  z-index: 0;
}

.app {
  max-width: 480px;
  margin: 0 auto;
  padding: 24px 16px 100px;
  position: relative;
  z-index: 1;
}

/* ── Header ── */
.header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 28px;
}

.logo {
  font-family: var(--display);
  font-size: 52px;
  color: #fff;
  letter-spacing: 3px;
  line-height: 1;
  text-shadow: 0 0 20px rgba(255,45,45,.6), 0 0 40px rgba(255,45,45,.3);
}

.logo span { color: var(--acc); text-shadow: 0 0 15px rgba(255,45,45,1); }

.header-right {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 6px;
  padding-top: 6px;
}

.wifi-badge {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--bt);
  border: 1px solid rgba(0,229,255,.3);
  background: rgba(0,229,255,.05);
  padding: 3px 8px;
  border-radius: 2px;
  text-shadow: 0 0 8px rgba(0,229,255,.8);
  box-shadow: 0 0 8px rgba(0,229,255,.1);
}

.settings-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--muted);
  width: 32px;
  height: 32px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all .2s;
}

.settings-btn:hover { border-color: var(--muted); color: var(--txt); }

/* ── Now Playing ── */
.now-playing {
  background: var(--panel);
  border: 1px solid rgba(0,229,255,.15);
  border-radius: 8px;
  padding: 20px;
  margin-bottom: 14px;
  position: relative;
  overflow: hidden;
  box-shadow: 0 0 15px rgba(0,229,255,.05), inset 0 0 20px rgba(0,0,0,.3);
}

.now-playing::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 3px;
  background: var(--acc);
  transform: scaleX(0);
  transform-origin: left;
  transition: transform .3s ease;
}

.now-playing.playing::before { transform: scaleX(1); }
.now-playing.playing { box-shadow: 0 0 18px rgba(0,229,255,.15), 0 0 40px rgba(0,229,255,.07); }

.np-label {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--bt);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 8px;
  text-shadow: 0 0 8px rgba(0,229,255,.7);
}

.pulse {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--muted);
}

.pulse.active {
  background: var(--acc);
  animation: pulse 1.2s infinite;
}

@keyframes pulse {
  0%,100% { opacity: 1; transform: scale(1); }
  50% { opacity: .5; transform: scale(1.4); }
}

.np-name {
  font-family: var(--display);
  font-size: 32px;
  color: #fff;
  letter-spacing: 1px;
  margin-bottom: 4px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  text-shadow: 0 0 12px rgba(255,45,45,.5);
}

.np-genre {
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 18px;
}

.controls {
  display: flex;
  gap: 10px;
  align-items: center;
}

.btn-play {
  width: 52px; height: 52px;
  border-radius: 50%;
  background: var(--acc);
  color: #fff;
  border: none;
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all .2s;
  flex-shrink: 0;
  box-shadow: 0 0 16px rgba(255,45,45,.5), 0 0 30px rgba(255,45,45,.2);
}

.btn-play:hover { opacity: .85; transform: scale(1.05); }
.btn-play:active { transform: scale(.95); }

.vol-container { flex: 1; }

.vol-label {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--bt);
  letter-spacing: 1px;
  display: flex;
  justify-content: space-between;
  margin-bottom: 6px;
  text-shadow: 0 0 6px rgba(0,229,255,.6);
}

.vol-slider {
  width: 100%;
  -webkit-appearance: none;
  appearance: none;
  height: 4px;
  border-radius: 2px;
  background: var(--border);
  outline: none;
  cursor: pointer;
}

.vol-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 16px; height: 16px;
  border-radius: 50%;
  background: var(--acc);
  cursor: pointer;
  transition: transform .15s;
}

.vol-slider::-webkit-slider-thumb:active { transform: scale(1.3); }

/* ── Bluetooth Button ── */
.bt-btn {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 18px;
  background: var(--panel);
  border: 1px solid rgba(0,229,255,.15);
  border-radius: 8px;
  cursor: pointer;
  margin-bottom: 14px;
  transition: all .2s;
}

.bt-btn:hover { border-color: var(--bt); box-shadow: 0 0 12px rgba(0,229,255,.15); }
.bt-btn.active { border-color: var(--bt); background: rgba(0,229,255,.05); box-shadow: 0 0 18px rgba(0,229,255,.2); }

.bt-left { display: flex; align-items: center; gap: 12px; }
.bt-icon { font-size: 20px; }
.bt-label { font-size: 14px; color: #fff; font-weight: 500; }
.bt-sub { font-size: 11px; color: var(--muted); margin-top: 1px; text-shadow: 0 0 5px rgba(0,229,255,.4); }

.bt-toggle {
  width: 44px; height: 24px;
  background: var(--border);
  border-radius: 12px;
  position: relative;
  transition: background .3s;
}

.bt-btn.active .bt-toggle { background: var(--bt); }

.bt-toggle::after {
  content: '';
  position: absolute;
  top: 3px; left: 3px;
  width: 18px; height: 18px;
  background: #fff;
  border-radius: 50%;
  transition: transform .3s;
}

.bt-btn.active .bt-toggle::after { transform: translateX(20px); }

/* ── Spotify Button ── */
.sp-btn {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 18px;
  background: var(--panel);
  border: 1px solid rgba(0,229,255,.15);
  border-radius: 8px;
  cursor: pointer;
  margin-bottom: 14px;
  transition: all .2s;
}

.sp-btn:hover { border-color: var(--sp); box-shadow: 0 0 12px rgba(29,185,84,.15); }
.sp-btn.active { border-color: var(--sp); background: rgba(29,185,84,.05); box-shadow: 0 0 18px rgba(29,185,84,.2); }

.sp-toggle {
  width: 44px; height: 24px;
  background: var(--border);
  border-radius: 12px;
  position: relative;
  transition: background .3s;
}

.sp-btn.active .sp-toggle { background: var(--sp); }

.sp-toggle::after {
  content: '';
  position: absolute;
  top: 3px; left: 3px;
  width: 18px; height: 18px;
  background: #fff;
  border-radius: 50%;
  transition: transform .3s;
}

.sp-btn.active .sp-toggle::after { transform: translateX(20px); }

/* ── Sender Liste ── */
.section-label {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--bt);
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-bottom: 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  text-shadow: 0 0 8px rgba(0,229,255,.7);
}

.add-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--muted);
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 1px;
  padding: 3px 10px;
  border-radius: 2px;
  cursor: pointer;
  transition: all .2s;
}

.add-btn:hover { border-color: var(--acc); color: var(--acc); }

/* Genre Filter */
.genre-filter {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  padding-bottom: 10px;
  margin-bottom: 10px;
  scrollbar-width: none;
}

.genre-filter::-webkit-scrollbar { display: none; }

.genre-chip {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 1px;
  padding: 4px 12px;
  border-radius: 2px;
  border: 1px solid rgba(0,229,255,.2);
  color: var(--muted);
  white-space: nowrap;
  cursor: pointer;
  transition: all .15s;
  background: none;
  text-shadow: 0 0 6px rgba(0,229,255,.4);
}

.genre-chip.active { background: rgba(255,45,45,.15); color: var(--acc); border-color: var(--acc); text-shadow: 0 0 8px rgba(255,45,45,.8); box-shadow: 0 0 10px rgba(255,45,45,.2); }

/* Station Items */
.stations-list { display: flex; flex-direction: column; gap: 6px; }

.station-item {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 16px;
  background: var(--panel);
  border: 1px solid rgba(0,229,255,.08);
  border-radius: 6px;
  cursor: pointer;
  transition: all .2s;
  position: relative;
  overflow: hidden;
}

.station-item::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: var(--acc);
  transform: scaleY(0);
  transition: transform .2s;
}

.station-item:hover::before { transform: scaleY(1); }
.station-item:hover { border-color: rgba(255,45,45,.2); }
.station-item.active { border-color: rgba(255,45,45,.3); background: rgba(255,45,45,.05); box-shadow: 0 0 12px rgba(0,229,255,.1); }
.station-item.active::before { transform: scaleY(1); }

.station-dot {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 500;
  color: var(--muted);
  flex-shrink: 0;
  font-family: var(--display);
  letter-spacing: 0;
  transition: all .2s;
}

.station-item.active .station-dot {
  background: var(--acc);
  color: #fff;
  box-shadow: 0 0 12px rgba(255,45,45,.6);
  text-shadow: 0 0 8px rgba(255,255,255,.8);
}

.station-info { flex: 1; min-width: 0; }
.station-name { font-size: 14px; color: #fff; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.station-genre { font-size: 11px; color: var(--muted); margin-top: 1px; text-shadow: 0 0 5px rgba(0,229,255,.4); }

.station-del {
  background: none;
  border: none;
  color: var(--muted);
  font-size: 16px;
  cursor: pointer;
  padding: 4px 8px;
  border-radius: 4px;
  opacity: 0;
  transition: all .2s;
}

.station-item:hover .station-del { opacity: 1; }
.station-del:hover { color: var(--acc2); }

/* ── Add Station Modal ── */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.8);
  z-index: 100;
  align-items: flex-end;
  backdrop-filter: blur(4px);
}

.modal-overlay.open { display: flex; }

.modal {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 12px 12px 0 0;
  padding: 24px 20px 40px;
  width: 100%;
  max-width: 480px;
  margin: 0 auto;
  animation: slideUp .3s ease;
}

@keyframes slideUp {
  from { transform: translateY(100%); }
  to { transform: translateY(0); }
}

.modal-title {
  font-family: var(--display);
  font-size: 28px;
  color: #fff;
  letter-spacing: 2px;
  margin-bottom: 20px;
}

.form-label {
  font-size: 10px;
  color: var(--acc);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 6px;
  margin-top: 14px;
  display: block;
}

.form-label:first-of-type { margin-top: 0; }

.form-input {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 11px 14px;
  color: #fff;
  font-family: var(--body);
  font-size: 14px;
  outline: none;
}

.form-input:focus { border-color: var(--acc); }

.modal-actions { display: flex; gap: 10px; margin-top: 20px; }

.btn-primary {
  flex: 1;
  padding: 13px;
  background: var(--acc);
  color: #000;
  border: none;
  border-radius: 4px;
  font-family: var(--body);
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: opacity .2s;
}

.btn-primary:hover { opacity: .85; }

.btn-cancel {
  padding: 13px 20px;
  background: transparent;
  color: var(--muted);
  border: 1px solid var(--border);
  border-radius: 4px;
  font-family: var(--body);
  font-size: 14px;
  cursor: pointer;
  transition: all .2s;
}

.btn-cancel:hover { border-color: var(--muted); color: var(--txt); }

/* ── Settings Panel ── */
.settings-panel {
  display: none;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 20px;
  margin-bottom: 14px;
}

.settings-panel.open { display: block; }

.setting-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
  font-size: 14px;
}

.setting-row:last-child { border-bottom: none; }
.setting-label { color: var(--txt); }

.setting-btn {
  font-family: var(--mono);
  font-size: 11px;
  padding: 5px 12px;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--muted);
  border-radius: 2px;
  cursor: pointer;
  transition: all .2s;
}

.setting-btn:hover { border-color: var(--acc2); color: var(--acc2); }
.setting-btn.danger:hover { background: var(--acc2); color: #fff; border-color: var(--acc2); }

/* Toast */
.toast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--panel);
  border: 1px solid var(--acc);
  color: var(--acc);
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 1px;
  padding: 10px 20px;
  border-radius: 4px;
  transition: transform .3s ease;
  z-index: 200;
  white-space: nowrap;
}

.toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <div class="header">
    <div class="logo">RADIO<span>.</span></div>
    <div class="header-right">
      <div class="wifi-badge">● {{ ssid or 'ONLINE' }}</div>
      <button class="settings-btn" onclick="toggleSettings()" title="Einstellungen">⚙</button>
    </div>
  </div>

  <!-- Settings Panel -->
  <div class="settings-panel" id="settingsPanel">
    <div class="setting-row">
      <span class="setting-label">WLAN wechseln</span>
      <button class="setting-btn danger" onclick="resetWifi()">Reset</button>
    </div>
    <div class="setting-row">
      <span class="setting-label">Neustart</span>
      <button class="setting-btn" onclick="doReboot()">Reboot</button>
    </div>
    <div class="setting-row">
      <span class="setting-label">Version</span>
      <span style="font-family:var(--mono);font-size:11px;color:var(--muted)">Pi Radio 1.0</span>
    </div>
  </div>

  <!-- Now Playing -->
  <div class="now-playing" id="nowPlaying">
    <div class="np-label">
      <div class="pulse" id="pulse"></div>
      JETZT LÄUFT
    </div>
    <div class="np-name" id="npName">—</div>
    <div class="np-genre" id="npGenre">Sender auswählen</div>

    <div class="controls">
      <button class="btn-play" id="playBtn" onclick="togglePlay()">▶</button>
      <div class="vol-container">
        <div class="vol-label">
          <span>LAUTSTÄRKE</span>
          <span id="volVal">80%</span>
        </div>
        <input type="range" class="vol-slider" id="volSlider"
               min="0" max="100" value="80"
               oninput="updateVolume(this.value)">
      </div>
    </div>
  </div>

  <!-- Bluetooth -->
  <div class="bt-btn" id="btBtn" onclick="toggleBluetooth()">
    <div class="bt-left">
      <div class="bt-icon">🎵</div>
      <div>
        <div class="bt-label">Bluetooth</div>
        <div class="bt-sub" id="btSub">Handy koppeln — "Pi-Radio"</div>
      </div>
    </div>
    <div class="bt-toggle"></div>
  </div>

  <!-- Spotify -->
  <div class="sp-btn" id="spBtn" onclick="toggleSpotify()">
    <div class="bt-left">
      <div class="bt-icon">🎧</div>
      <div>
        <div class="bt-label">Spotify Connect</div>
        <div class="bt-sub" id="spSub">Pi erscheint in der Spotify App</div>
      </div>
    </div>
    <div class="sp-toggle"></div>
  </div>

  <!-- Sender -->
  <div class="section-label">
    SENDER
    <button class="add-btn" onclick="openModal()">+ HINZUFÜGEN</button>
  </div>

  <!-- Genre Filter -->
  <div class="genre-filter">
    <button class="genre-chip active" onclick="filterGenre('', this)">Alle</button>
    <button class="genre-chip" onclick="filterGenre('Pop', this)">Pop</button>
    <button class="genre-chip" onclick="filterGenre('Rock', this)">Rock</button>
    <button class="genre-chip" onclick="filterGenre('News', this)">News</button>
    <button class="genre-chip" onclick="filterGenre('Jazz', this)">Jazz</button>
    <button class="genre-chip" onclick="filterGenre('Klassik', this)">Klassik</button>
    <button class="genre-chip" onclick="filterGenre('Electronic', this)">Electronic</button>
  </div>

  <div class="stations-list" id="stationsList">
    <!-- Dynamisch befüllt -->
  </div>

</div>

<!-- Add Station Modal -->
<div class="modal-overlay" id="modal" onclick="closeModalBg(event)">
  <div class="modal">
    <div class="modal-title">SENDER HINZUFÜGEN</div>
    <label class="form-label">Name</label>
    <input class="form-input" type="text" id="newName" placeholder="z.B. RADIO BOB">
    <label class="form-label">Stream URL</label>
    <input class="form-input" type="url" id="newUrl" placeholder="http://stream...mp3">
    <label class="form-label">Genre (optional)</label>
    <input class="form-input" type="text" id="newGenre" placeholder="Pop / Rock / Jazz ...">
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Abbrechen</button>
      <button class="btn-primary" onclick="addStation()">Speichern →</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
let stations = [];
let currentStation = null;
let isPlaying = false;
let isBT = false;
let isSP = false;
let currentGenre = '';
let volTimer = null;

// ── Init ──────────────────────────────────────
async function init() {
  await loadStations();
  await refreshStatus();
  setInterval(refreshStatus, 5000);
}

async function loadStations() {
  const r = await fetch('/stations');
  stations = await r.json();
  renderStations();
}

function renderStations() {
  const list = document.getElementById('stationsList');
  list.innerHTML = '';
  const filtered = stations.filter(s => !currentGenre || s.genre === currentGenre);

  filtered.forEach((s, visIdx) => {
    const realIdx = stations.indexOf(s);
    const initials = s.name.split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
    const active = currentStation === realIdx && isPlaying;

    const el = document.createElement('div');
    el.className = 'station-item' + (active ? ' active' : '');
    el.innerHTML = `
      <div class="station-dot">${active ? '♪' : initials}</div>
      <div class="station-info">
        <div class="station-name">${s.name}</div>
        <div class="station-genre">${s.genre || 'Radio'}</div>
      </div>
      <button class="station-del" onclick="delStation(event,${realIdx})">✕</button>
    `;
    el.addEventListener('click', () => playStation(realIdx));
    list.appendChild(el);
  });

  if (filtered.length === 0) {
    list.innerHTML = '<div style="text-align:center;padding:24px;color:var(--muted);font-size:13px;">Keine Sender in dieser Kategorie</div>';
  }
}

// ── Playback ──────────────────────────────────
async function playStation(idx) {
  if (isBT) {
    toast('Bluetooth aktiv — zuerst deaktivieren');
    return;
  }
  if (isSP) {
    toast('Spotify aktiv — zuerst deaktivieren');
    return;
  }
  const r = await fetch(`/play/${idx}`);
  const d = await r.json();
  if (d.status === 'playing') {
    currentStation = idx;
    isPlaying = true;
    updateNowPlaying();
    renderStations();
  }
}

async function togglePlay() {
  if (isPlaying) {
    await fetch('/stop');
    isPlaying = false;
    updateNowPlaying();
    renderStations();
  } else if (currentStation !== null) {
    playStation(currentStation);
  }
}

function updateNowPlaying() {
  const btn = document.getElementById('playBtn');
  const pulse = document.getElementById('pulse');
  const np = document.getElementById('nowPlaying');

  if (isPlaying && currentStation !== null) {
    const s = stations[currentStation];
    document.getElementById('npName').textContent = s.name;
    document.getElementById('npGenre').textContent = s.genre || 'Radio';
    btn.textContent = '■';
    pulse.classList.add('active');
    np.classList.add('playing');
  } else {
    document.getElementById('npName').textContent = '—';
    document.getElementById('npGenre').textContent = 'Sender auswählen';
    btn.textContent = '▶';
    pulse.classList.remove('active');
    np.classList.remove('playing');
  }
}

async function refreshStatus() {
  try {
    const r = await fetch('/status');
    const d = await r.json();
    isPlaying = d.playing;
    if (d.station !== null) currentStation = d.station;
    isBT = d.bt_mode;
    isSP = d.spotify_mode;

    document.getElementById('volSlider').value = d.volume;
    document.getElementById('volVal').textContent = d.volume + '%';

    updateNowPlaying();
    updateBTButton();
    updateSPButton();
    renderStations();
  } catch(e) {}
}

// ── Volume ────────────────────────────────────
function updateVolume(val) {
  document.getElementById('volVal').textContent = val + '%';
  clearTimeout(volTimer);
  volTimer = setTimeout(() => fetch(`/volume/${val}`), 300);
}

// ── Bluetooth ─────────────────────────────────
async function toggleBluetooth() {
  if (!isBT) {
    const r = await fetch('/bluetooth/on');
    isBT = true;
    isPlaying = false;
    updateNowPlaying();
    toast('Bluetooth aktiv — suche "Pi-Radio"');
  } else {
    await fetch('/bluetooth/off');
    isBT = false;
    toast('Bluetooth deaktiviert');
  }
  updateBTButton();
}

function updateBTButton() {
  const btn = document.getElementById('btBtn');
  const sub = document.getElementById('btSub');
  if (isBT) {
    btn.classList.add('active');
    sub.textContent = 'Aktiv — suche "Pi-Radio" auf deinem Handy';
  } else {
    btn.classList.remove('active');
    sub.textContent = 'Handy koppeln — "Pi-Radio"';
  }
}

// ── Spotify ───────────────────────────────────
async function toggleSpotify() {
  if (!isSP) {
    await fetch('/spotify/on');
    isSP = true;
    isBT = false;
    isPlaying = false;
    updateNowPlaying();
    updateBTButton();
    toast('Spotify aktiv — wähle "Pi-Radio" in der Spotify App');
  } else {
    await fetch('/spotify/off');
    isSP = false;
    toast('Spotify deaktiviert');
  }
  updateSPButton();
}

function updateSPButton() {
  const btn = document.getElementById('spBtn');
  const sub = document.getElementById('spSub');
  if (isSP) {
    btn.classList.add('active');
    sub.textContent = 'Aktiv — wähle "Pi-Radio" in der Spotify App';
  } else {
    btn.classList.remove('active');
    sub.textContent = 'Pi erscheint in der Spotify App';
  }
}

// ── Genre Filter ──────────────────────────────
function filterGenre(genre, el) {
  currentGenre = genre;
  document.querySelectorAll('.genre-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  renderStations();
}

// ── Modal ─────────────────────────────────────
function openModal() {
  document.getElementById('modal').classList.add('open');
  document.getElementById('newName').focus();
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.getElementById('newName').value = '';
  document.getElementById('newUrl').value = '';
  document.getElementById('newGenre').value = '';
}

function closeModalBg(e) {
  if (e.target === document.getElementById('modal')) closeModal();
}

async function addStation() {
  const name = document.getElementById('newName').value.trim();
  const url  = document.getElementById('newUrl').value.trim();
  const genre = document.getElementById('newGenre').value.trim();

  if (!name || !url) {
    toast('Name und URL sind Pflichtfelder');
    return;
  }

  await fetch('/stations/add', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({name, url, genre})
  });

  await loadStations();
  closeModal();
  toast('Sender gespeichert!');
}

async function delStation(e, idx) {
  e.stopPropagation();
  if (!confirm(`"${stations[idx].name}" löschen?`)) return;
  if (currentStation === idx) {
    await fetch('/stop');
    isPlaying = false;
    currentStation = null;
    updateNowPlaying();
  }
  await fetch(`/stations/delete/${idx}`, {method:'DELETE'});
  await loadStations();
}

// ── Settings ──────────────────────────────────
function toggleSettings() {
  document.getElementById('settingsPanel').classList.toggle('open');
}

function resetWifi() {
  if (confirm('WLAN zurücksetzen und neu einrichten?')) {
    window.location.href = '/setup/reset';
  }
}

function doReboot() {
  if (confirm('Pi neu starten?')) {
    fetch('/reboot');
    toast('Neustart...');
  }
}

// ── Toast ─────────────────────────────────────
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

init();
</script>
</body>
</html>
